<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Assistance | Brand Asset Manager</title>
    <style>
        :root {
            --ua-blue: #0054A6;
            --ua-green: #8DC63F;
            --ua-dark: #231F20;
            --ua-light: #F4F6F9;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--ua-light);
            color: var(--ua-dark);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--ua-blue);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 4px solid var(--ua-green);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: white;
            margin: 40px auto;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .file-select-btn {
            background-color: var(--ua-blue);
            color: white;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: inline-block;
            margin: 20px 0;
        }

        .file-select-btn:hover {
            background-color: #003d7a;
        }

        .btn-download {
            background-color: var(--ua-green);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .btn-download:hover {
            background-color: #7cb334;
        }

        .preview-container {
            margin-top: 30px;
            display: none;
            border-top: 1px solid #E2E8F0;
            padding-top: 25px;
        }

        .canvas-wrapper {
            background-color: #333; 
            background-image: linear-gradient(45deg, #252525 25%, transparent 25%), 
                              linear-gradient(-45deg, #252525 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #252525 75%), 
                              linear-gradient(-45deg, transparent 75%, #252525 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            width: 250px;
            height: 150px;
            margin: 0 auto;
            border: 2px solid #1A1A1A;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Universal Assistance | Brand Asset Manager</h1>
    </header>

    <div class="container">
        <h3>Adaptador de Logos (Full HD+)</h3>
        <p style="color:#555; font-size: 14px;">Seleccioná una imagen PNG o JPG. Se descargará automáticamente en proporción 250x150 a una resolución nítida de 2000x1200px en blanco con fondo transparente.</p>

        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" style="display: block; margin: 20px auto;">

        <div class="preview-container" id="previewContainer">
            <p style="font-weight: bold; font-size: 14px; color: #4A5568;">Vista previa visual:</p>
            <div class="canvas-wrapper">
                <canvas id="logoCanvas"></canvas>
            </div>
            <button class="btn-download" id="downloadBtn">Descargar PNG Full HD+</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');

        const TARGET_WIDTH = 2000;
        const TARGET_HEIGHT = 1200;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const reader = new FileReader();
                reader.readAsDataURL(e.target.files[0]);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        // Procesar
                        canvas.width = TARGET_WIDTH;
                        canvas.height = TARGET_HEIGHT;
                        ctx.clearRect(0, 0, TARGET_WIDTH, TARGET_HEIGHT);
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';

                        let width = img.width;
                        let height = img.height;
                        const ratio = Math.min(TARGET_WIDTH / width, TARGET_HEIGHT / height);
                        width = width * ratio;
                        height = height * ratio;

                        const x = (TARGET_WIDTH - width) / 2;
                        const y = (TARGET_HEIGHT - height) / 2;
                        ctx.drawImage(img, x, y, width, height);

                        const imageData = ctx.getImageData(0, 0, TARGET_WIDTH, TARGET_HEIGHT);
                        const data = imageData.data;

                        for (let i = 0; i < data.length; i += 4) {
                            let r = data[i]; let g = data[i+1]; let b = data[i+2]; let alpha = data[i+3];
                            if (alpha > 10) {
                                if (r > 230 && g > 230 && b > 230) {
                                    data[i+3] = 0; 
                                } else {
                                    data[i] = 255; data[i+1] = 255; data[i+2] = 255; 
                                }
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        previewContainer.style.display = 'block';
                        downloadBtn.style.display = 'inline-block';
                    }
                }
            }
        });

        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'logo-universal-assistance.png';
            link.href = canvas.toToDataURL ? canvas.toToDataURL('image/png') : canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
